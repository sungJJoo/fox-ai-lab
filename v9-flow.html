<!-- 흐르는 활동 제목 + 도구 클라우드 섹션 시안 v9 (codeit 참고, 확인용 임시 파일) -->
<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>FOX AI 연구소 — 흐르는 활동 시안</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
	<style>
		:root{
			--bg:#ffffff; --ink:#0f1719; --muted:#8a949a; --line:#eef2f3;
			--spot:#13b3a6; --spot-deep:#0a8d83; --spot-bg:#e9f8f5;
			--sans:"Pretendard Variable",Pretendard,system-ui,sans-serif;
		}
		*{margin:0;padding:0;box-sizing:border-box}
		body{font-family:var(--sans);color:var(--ink);line-height:1.7;word-break:keep-all;-webkit-font-smoothing:antialiased;background:var(--bg)}
		.wrap{max-width:1180px;margin:0 auto;padding:0 clamp(24px,5vw,48px)}

		.flow-sec{position:relative;padding:clamp(80px,10vw,140px) 0 0;overflow:hidden}
		.flow-sec .top{display:grid;grid-template-columns:0.9fr 1.1fr;gap:clamp(30px,5vw,70px);align-items:center}
		.f-lead{font-weight:800;font-size:clamp(30px,4vw,50px);line-height:1.25;letter-spacing:-.035em;color:var(--ink)}
		.f-lead small{display:block;font-size:clamp(15px,1.6vw,18px);font-weight:600;color:var(--spot-deep);letter-spacing:-.01em;margin-bottom:14px}

		.flow{position:relative;height:clamp(220px,26vw,300px)}
		.flow::before,.flow::after{content:"";position:absolute;left:0;right:0;height:90px;z-index:2;pointer-events:none}
		.flow::before{top:0;background:linear-gradient(#fff,rgba(255,255,255,0))}
		.flow::after{bottom:0;background:linear-gradient(rgba(255,255,255,0),#fff)}
		.flow .hl{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:62px;border:1.5px solid var(--spot);border-radius:16px;background:var(--spot-bg);z-index:0}
		.flow-track{position:absolute;left:0;right:0;top:0;will-change:transform}
		.flow-track li{list-style:none;height:62px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:clamp(17px,2vw,24px);letter-spacing:-.02em;color:var(--ink);transition:opacity .2s}
		.flow-track li b{color:var(--spot-deep)}

		.cloud{position:relative;margin-top:clamp(40px,6vw,72px);background:#f6f9f9;border-top:1px solid var(--line)}
		.cloud .wrap{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:clamp(14px,2vw,30px);padding:clamp(36px,5vw,60px) 24px}
		.cloud .chip{display:inline-flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px 18px;box-shadow:0 8px 22px rgba(15,23,25,.05);transition:transform .25s cubic-bezier(.16,1,.3,1),box-shadow .25s}
		.cloud .chip:hover{transform:translateY(-5px);box-shadow:0 16px 34px rgba(15,23,25,.1)}
		.cloud .chip .ic{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;letter-spacing:-.03em;flex-shrink:0}
		.cloud .chip span{font-size:14.5px;font-weight:600;letter-spacing:-.01em;color:#33424a}

		@media (max-width:860px){
			.flow-sec .top{grid-template-columns:1fr;gap:20px}
			.cloud .chip span{display:none}
			.cloud .chip{padding:13px}
		}
		@media (prefers-reduced-motion:reduce){ .flow-track{transform:none !important} }
	</style>
</head>
<body>
	<section class="flow-sec">
		<div class="wrap top">
			<p class="f-lead"><small>FOX AI 연구소에서는</small>이런 걸 직접<br />만들며 배웁니다</p>
			<div class="flow" id="flow">
				<div class="hl"></div>
				<ul class="flow-track" id="track">
					<li>레고로 <b>문제 해결의 힘</b> 키우기</li>
					<li>마인크래프트로 <b>우리 마을</b> 지키기</li>
					<li>스크래치로 <b>나만의 게임</b> 만들기</li>
					<li>생성형 AI로 <b>포스터·음악</b> 창작하기</li>
					<li>파이썬으로 <b>코딩의 첫발</b> 떼기</li>
					<li>AI·디지털로 떠나는 <b>역사 여행</b></li>
				</ul>
			</div>
		</div>

		<div class="cloud">
			<div class="wrap">
				<span class="chip"><span class="ic" style="background:#D01012">L</span><span>LEGO Education</span></span>
				<span class="chip"><span class="ic" style="background:#5FA63E">M</span><span>Minecraft Education</span></span>
				<span class="chip"><span class="ic" style="background:#F2900D">S</span><span>Scratch</span></span>
				<span class="chip"><span class="ic" style="background:#3776AB">Py</span><span>Python</span></span>
				<span class="chip"><span class="ic" style="background:#7c5cf0">AI</span><span>생성형 AI</span></span>
				<span class="chip"><span class="ic" style="background:#232F3E">aws</span><span>AWS DeepRacer</span></span>
				<span class="chip"><span class="ic" style="background:#00C4CC">C</span><span>Canva</span></span>
			</div>
		</div>
	</section>

	<script>
		(function(){
			var flow=document.getElementById('flow'), track=document.getElementById('track');
			if(!flow||!track)return;
			var items=Array.prototype.slice.call(track.children);
			var ROW=62, n=items.length, total=ROW*n;
			items.forEach(function(li){ var c=li.cloneNode(true); track.appendChild(c); });
			var all=Array.prototype.slice.call(track.children);
			var reduced=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
			function center(){ return flow.clientHeight/2; }
			function paint(off){
				var c=center();
				all.forEach(function(li,i){
					var y=i*ROW - off + ROW/2;
					var d=Math.abs(y - c);
					var k=Math.max(0,1 - d/(ROW*1.7));
					li.style.opacity=(0.22+0.78*k).toFixed(2);
					li.style.fontWeight = k>0.6 ? 700 : 600;
				});
			}
			if(reduced){ track.style.transform='translateY('+ (center()-ROW/2 -ROW) +'px)'; paint(0); return; }
			var speed=0.058, t0=null, base=0;
			function loop(t){
				if(!t0)t0=t;
				var off=((t-t0)*speed) % total;
				var ty = (center()-ROW/2) - off;
				track.style.transform='translateY('+ty+'px)';
				paint(off - (center()-ROW/2));
				requestAnimationFrame(loop);
			}
			requestAnimationFrame(loop);
		})();
	</script>
</body>
</html>
