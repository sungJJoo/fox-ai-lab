<!-- 성장 곡선 섹션 시안 v7 (A안: FOX 틸 + codeit 폰트·그림자·여백 기법, 메인 추가용 임시 파일) -->
<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>FOX AI 연구소 — 성장 곡선 시안</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
	<style>
		:root{
			--bg:#091824; --bg-deep:#06121b; --spot:#20c5bc; --spot-soft:#5eead4; --blue:#3194db; --blue-soft:#7cc1f0;
			--sans:"Pretendard Variable",Pretendard,system-ui,sans-serif; --en:"Space Grotesk",sans-serif;
		}
		*{margin:0;padding:0;box-sizing:border-box}
		body{font-family:var(--sans);line-height:1.7;word-break:keep-all;-webkit-font-smoothing:antialiased;background:#040b11}
		.wrap{max-width:1280px;margin:0 auto;padding:0 clamp(28px,5vw,72px)}

		.curve-sec{position:relative;background:var(--bg);color:#fff;padding:clamp(96px,12vw,176px) 0;overflow:hidden}
		.curve-sec::before{content:"";position:absolute;width:880px;height:880px;right:-180px;top:-300px;background:radial-gradient(circle, rgba(32,197,188,.22) 0%, transparent 60%);pointer-events:none}
		.curve-sec::after{content:"";position:absolute;width:680px;height:680px;left:-220px;bottom:-260px;background:radial-gradient(circle, rgba(49,148,219,.18) 0%, transparent 62%);pointer-events:none}
		.curve-sec .wrap{position:relative;display:grid;grid-template-columns:0.84fr 1.16fr;gap:clamp(36px,5vw,80px);align-items:center}

		.label{font-family:var(--en);font-size:12.5px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:var(--spot-soft);display:flex;align-items:center;gap:12px;margin-bottom:30px}
		.label::before{content:"";width:30px;height:1.5px;background:var(--spot)}
		.tit{display:block}
		.t-sub{display:block;font-size:clamp(17px,2vw,23px);font-weight:600;color:rgba(255,255,255,.42);letter-spacing:-.01em;margin-bottom:18px}
		.t-main{display:block;font-weight:800;font-size:clamp(35px,4.8vw,60px);line-height:1.16;letter-spacing:-.035em;color:#fff}
		.t-main .hl{font-style:normal;color:var(--spot)}
		.desc{margin-top:30px;font-size:clamp(15px,1.45vw,17px);color:rgba(255,255,255,.56);line-height:1.95;max-width:26em;font-weight:400}
		.legend{display:flex;gap:28px;margin-top:40px;flex-wrap:wrap}
		.legend li{list-style:none;display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:500;color:rgba(255,255,255,.7);letter-spacing:-.01em}
		.legend li::before{content:"";width:13px;height:13px;border-radius:5px}
		.legend .l-pbl::before{background:linear-gradient(120deg,var(--blue),var(--spot))}
		.legend .l-vid::before{background:#2f3b46}

		.graph{position:relative;filter:drop-shadow(0 40px 70px rgba(0,0,0,.55))}
		.graph svg{width:100%;height:auto;overflow:visible;display:block}
		.nd{position:absolute;transform:translate(-50%,-50%);display:flex;align-items:center;gap:8px;background:rgba(10,24,36,.62);border:1px solid rgba(124,193,240,.26);border-radius:13px;padding:9px 16px;font-weight:700;font-size:13.5px;letter-spacing:-.01em;color:#fff;white-space:nowrap;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);box-shadow:0 18px 42px rgba(0,0,0,.5)}
		.nd i{width:7px;height:7px;border-radius:50%;background:var(--blue-soft)}
		.nd.hi{border-color:rgba(32,197,188,.5)}
		.nd.hi i{background:var(--spot);box-shadow:0 0 12px var(--spot)}

		@media (max-width:900px){
			.curve-sec .wrap{grid-template-columns:1fr;gap:26px}
			.graph{order:2}
			.nd{font-size:12.5px;padding:7px 12px}
		}
		@media (prefers-reduced-motion:reduce){ .draw{stroke-dashoffset:0 !important;transition:none !important} }
	</style>
</head>
<body>
	<section class="curve-sec">
		<div class="wrap">
			<div class="tx">
				<p class="label">Why FOX</p>
				<h2 class="tit">
					<span class="t-sub">영상만 보는 수업은 그만,</span>
					<span class="t-main">이제 <em class="hl">직접 만들며</em><br />자라는 실력</span>
				</h2>
				<p class="desc">보기만 한 학습은 금방 잊힙니다. 질문하고, 직접 만들고, 발표하는 프로젝트 학습(PBL)으로 배운 것이 진짜 실력으로 남습니다.</p>
				<ul class="legend">
					<li class="l-pbl">프로젝트 학습 (PBL)</li>
					<li class="l-vid">영상만 보는 학습</li>
				</ul>
			</div>

			<div class="graph" id="graph">
				<svg viewBox="0 0 640 440" id="svg">
					<defs>
						<linearGradient id="gline" x1="0" y1="1" x2="1" y2="0">
							<stop offset="0" stop-color="#3194db" /><stop offset="0.55" stop-color="#23bcc4" /><stop offset="1" stop-color="#5eead4" />
						</linearGradient>
						<linearGradient id="gfill" x1="0" y1="0" x2="0" y2="1">
							<stop offset="0" stop-color="#20c5bc" stop-opacity=".26" /><stop offset="1" stop-color="#20c5bc" stop-opacity="0" />
						</linearGradient>
						<filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="8" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
					</defs>
					<path class="draw vline" d="M 28,416 C 250,410 430,388 624,350" fill="none" stroke="#2f3b46" stroke-width="2.5" stroke-dasharray="1 11" stroke-linecap="round" />
					<path d="M 28,422 C 250,416 350,318 452,202 C 532,110 588,76 624,40 L 624,438 L 28,438 Z" fill="url(#gfill)" />
					<path class="draw pline" d="M 28,422 C 250,416 350,318 452,202 C 532,110 588,76 624,40" fill="none" stroke="url(#gline)" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />
					<circle cx="250" cy="416" r="5.5" fill="#091824" stroke="#3194db" stroke-width="3" />
					<circle cx="452" cy="202" r="5.5" fill="#091824" stroke="#23bcc4" stroke-width="3" />
					<circle cx="612" cy="48" r="9" fill="#20c5bc" stroke="#091824" stroke-width="3.5" filter="url(#glow)" />
				</svg>
				<div class="nd" style="left:39%;top:95%"><i></i>이해</div>
				<div class="nd" style="left:70.5%;top:46%"><i></i>제작</div>
				<div class="nd hi" style="left:95%;top:11%"><i></i>발표 · 성장</div>
			</div>
		</div>
	</section>

	<script>
		(function(){
			var p=document.querySelector('.pline');
			if(!p)return;
			var reduced=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
			var L=p.getTotalLength();
			p.style.strokeDasharray=L; p.style.strokeDashoffset=reduced?0:L;
			if(reduced)return;
			var io=new IntersectionObserver(function(es){es.forEach(function(e){ if(e.isIntersecting){ p.style.transition='stroke-dashoffset 1.9s cubic-bezier(.22,1,.36,1)'; p.style.strokeDashoffset=0; io.disconnect(); } });},{threshold:.4});
			io.observe(document.getElementById('graph'));
		})();
	</script>
</body>
</html>
