<!-- 성장 곡선 섹션 시안 v7 (정제: Pretendard·깊이·절제, 메인 추가용 임시 파일) -->
<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>FOX AI 연구소 — 성장 곡선 시안</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
	<style>
		:root{
			--bg:#0b0a16; --spot:#2dd4bf; --spot-soft:#5eead4; --purple:#7c5cf0; --purple-soft:#a892f7;
			--sans:"Pretendard Variable",Pretendard,system-ui,sans-serif; --en:"Space Grotesk",sans-serif;
		}
		*{margin:0;padding:0;box-sizing:border-box}
		body{font-family:var(--sans);line-height:1.7;word-break:keep-all;-webkit-font-smoothing:antialiased;background:#07060f}
		.wrap{max-width:1200px;margin:0 auto;padding:0 clamp(24px,5vw,64px)}

		.curve-sec{position:relative;background:var(--bg);color:#fff;padding:clamp(84px,11vw,160px) 0;overflow:hidden}
		.curve-sec::before{content:"";position:absolute;width:680px;height:680px;right:-120px;top:-220px;background:radial-gradient(circle, rgba(124,92,240,.30) 0%, transparent 62%);pointer-events:none}
		.curve-sec::after{content:"";position:absolute;width:520px;height:520px;left:-160px;bottom:-200px;background:radial-gradient(circle, rgba(45,212,191,.16) 0%, transparent 62%);pointer-events:none}
		.curve-sec .wrap{position:relative;display:grid;grid-template-columns:1fr 1.08fr;gap:clamp(40px,6vw,90px);align-items:center}

		.label{font-family:var(--en);font-size:12.5px;font-weight:700;letter-spacing:.26em;text-transform:uppercase;color:var(--spot-soft);display:flex;align-items:center;gap:11px;margin-bottom:28px}
		.label::before{content:"";width:28px;height:1.5px;background:var(--spot)}
		.tit{font-family:var(--sans);font-weight:800;font-size:clamp(31px,4vw,52px);line-height:1.26;letter-spacing:-.028em;color:#fff}
		.tit .hl{position:relative;color:var(--spot)}
		.desc{margin-top:26px;font-size:clamp(15px,1.45vw,17px);color:rgba(255,255,255,.62);line-height:1.9;max-width:29em;font-weight:400}
		.legend{display:flex;gap:28px;margin-top:38px;flex-wrap:wrap}
		.legend li{list-style:none;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500;color:rgba(255,255,255,.78);letter-spacing:-.01em}
		.legend li::before{content:"";width:14px;height:14px;border-radius:5px}
		.legend .l-pbl::before{background:linear-gradient(120deg,var(--purple),var(--spot))}
		.legend .l-vid::before{background:#403c55}

		.graph{position:relative;filter:drop-shadow(0 30px 60px rgba(0,0,0,.5))}
		.graph svg{width:100%;height:auto;overflow:visible;display:block}
		.nd{position:absolute;transform:translate(-50%,-50%);display:flex;align-items:center;gap:9px;background:rgba(15,13,30,.7);border:1px solid rgba(168,146,247,.32);border-radius:13px;padding:9px 16px;font-family:var(--sans);font-weight:700;font-size:14px;letter-spacing:-.01em;color:#fff;white-space:nowrap;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);box-shadow:0 12px 30px rgba(0,0,0,.4)}
		.nd i{width:7px;height:7px;border-radius:50%;background:var(--spot);box-shadow:0 0 10px var(--spot)}
		.nd.hi{border-color:rgba(45,212,191,.6)}

		@media (max-width:880px){
			.curve-sec .wrap{grid-template-columns:1fr;gap:30px}
			.graph{order:2}
			.nd{font-size:13px;padding:7px 12px}
		}
		@media (prefers-reduced-motion:reduce){ .draw{stroke-dashoffset:0 !important;transition:none !important} }
	</style>
</head>
<body>
	<section class="curve-sec">
		<div class="wrap">
			<div class="tx">
				<p class="label">Why FOX</p>
				<h2 class="tit">영상만 보는 수업은 그만,<br />이제 <span class="hl">직접 만들며</span> 자랍니다</h2>
				<p class="desc">보기만 한 학습은 금방 잊힙니다. 질문하고, 직접 만들고, 발표하는 프로젝트 학습(PBL)으로 배운 것이 진짜 실력으로 남습니다.</p>
				<ul class="legend">
					<li class="l-pbl">프로젝트 학습 (PBL)</li>
					<li class="l-vid">영상만 보는 학습</li>
				</ul>
			</div>

			<div class="graph" id="graph">
				<svg viewBox="0 0 600 430" id="svg">
					<defs>
						<linearGradient id="gline" x1="0" y1="1" x2="1" y2="0">
							<stop offset="0" stop-color="#7c5cf0" /><stop offset="0.55" stop-color="#9f7ff0" /><stop offset="1" stop-color="#2dd4bf" />
						</linearGradient>
						<linearGradient id="gfill" x1="0" y1="0" x2="0" y2="1">
							<stop offset="0" stop-color="#7c5cf0" stop-opacity=".26" /><stop offset="1" stop-color="#7c5cf0" stop-opacity="0" />
						</linearGradient>
						<filter id="glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="6" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
					</defs>
					<g stroke="rgba(255,255,255,.05)" stroke-width="1">
						<line x1="24" y1="96" x2="576" y2="96" /><line x1="24" y1="192" x2="576" y2="192" /><line x1="24" y1="288" x2="576" y2="288" /><line x1="24" y1="384" x2="576" y2="384" />
					</g>
					<path class="draw vline" d="M 24,392 C 210,386 370,364 576,326" fill="none" stroke="#403c55" stroke-width="2.5" stroke-dasharray="2 10" stroke-linecap="round" />
					<path d="M 24,398 C 228,392 332,300 424,206 C 492,138 540,104 576,62 L 576,406 L 24,406 Z" fill="url(#gfill)" />
					<path class="draw pline" d="M 24,398 C 228,392 332,300 424,206 C 492,138 540,104 576,62" fill="none" stroke="url(#gline)" stroke-width="5" stroke-linecap="round" filter="url(#glow)" />
					<circle cx="228" cy="392" r="5.5" fill="#0b0a16" stroke="#7c5cf0" stroke-width="3" />
					<circle cx="424" cy="206" r="5.5" fill="#0b0a16" stroke="#9f7ff0" stroke-width="3" />
					<circle cx="566" cy="70" r="9" fill="#2dd4bf" stroke="#0b0a16" stroke-width="3" filter="url(#glow)" />
				</svg>
				<div class="nd" style="left:39%;top:91%"><i></i>이해</div>
				<div class="nd" style="left:71%;top:48%"><i></i>제작</div>
				<div class="nd hi" style="left:93%;top:16%"><i></i>발표 · 성장</div>
			</div>
		</div>
	</section>

	<script>
		(function(){
			var p=document.querySelector('.pline');
			if(!p)return;
			var reduced=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
			var L=p.getTotalLength();
			p.style.strokeDasharray=L; p.style.strokeDashoffset=reduced?0:L;
			if(reduced)return;
			var io=new IntersectionObserver(function(es){es.forEach(function(e){ if(e.isIntersecting){ p.style.transition='stroke-dashoffset 1.8s cubic-bezier(.22,1,.36,1)'; p.style.strokeDashoffset=0; io.disconnect(); } });},{threshold:.45});
			io.observe(document.getElementById('graph'));
		})();
	</script>
</body>
</html>
