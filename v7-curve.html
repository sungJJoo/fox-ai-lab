<!-- 성장 곡선 섹션 시안 v7 (고정 렌즈 + 안에서 흐르는 곡선/노드, FOX 틸, 메인 추가용 임시 파일) -->
<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>FOX AI 연구소 — 성장 곡선 시안</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
	<style>
		:root{
			--bg:#091824; --spot:#20c5bc; --spot-soft:#5eead4; --blue:#3194db; --blue-soft:#7cc1f0;
			--sans:"Pretendard Variable",Pretendard,system-ui,sans-serif; --en:"Space Grotesk",sans-serif;
		}
		*{margin:0;padding:0;box-sizing:border-box}
		body{font-family:var(--sans);line-height:1.7;word-break:keep-all;-webkit-font-smoothing:antialiased;background:#040b11}
		.wrap{max-width:1280px;margin:0 auto;padding:0 clamp(28px,5vw,72px)}

		.curve-sec{position:relative;background:var(--bg);color:#fff;padding:clamp(90px,11vw,164px) 0;overflow:hidden}
		.curve-sec::before{content:"";position:absolute;width:880px;height:880px;right:-180px;top:-300px;background:radial-gradient(circle, rgba(32,197,188,.20) 0%, transparent 60%);pointer-events:none}
		.curve-sec::after{content:"";position:absolute;width:680px;height:680px;left:-220px;bottom:-260px;background:radial-gradient(circle, rgba(49,148,219,.16) 0%, transparent 62%);pointer-events:none}
		.curve-sec .wrap{position:relative;display:grid;grid-template-columns:0.82fr 1.18fr;gap:clamp(36px,5vw,76px);align-items:center}

		.label{font-family:var(--en);font-size:12.5px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:var(--spot-soft);display:flex;align-items:center;gap:12px;margin-bottom:30px}
		.label::before{content:"";width:30px;height:1.5px;background:var(--spot)}
		.t-sub{display:block;font-size:clamp(17px,2vw,23px);font-weight:600;color:rgba(255,255,255,.42);letter-spacing:-.01em;margin-bottom:18px}
		.t-main{display:block;font-weight:800;font-size:clamp(35px,4.8vw,60px);line-height:1.16;letter-spacing:-.035em;color:#fff}
		.t-main .hl{font-style:normal;color:var(--spot)}
		.desc{margin-top:30px;font-size:clamp(15px,1.45vw,17px);color:rgba(255,255,255,.56);line-height:1.95;max-width:26em}
		.legend{display:flex;gap:28px;margin-top:40px;flex-wrap:wrap}
		.legend li{list-style:none;display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:500;color:rgba(255,255,255,.7);letter-spacing:-.01em}
		.legend li::before{content:"";width:13px;height:13px;border-radius:5px}
		.legend .l-pbl::before{background:linear-gradient(120deg,var(--blue),var(--spot))}
		.legend .l-vid::before{background:#2f3b46}

		.graph{position:relative;filter:drop-shadow(0 40px 70px rgba(0,0,0,.5))}
		.graph svg{width:100%;height:auto;overflow:visible;display:block}
		.lbl{font-family:var(--sans);font-weight:700;font-size:14px;fill:#fff}
		.lbl-bg{fill:rgba(10,24,36,.72);stroke:rgba(124,193,240,.26);stroke-width:1}

		@media (max-width:900px){
			.curve-sec .wrap{grid-template-columns:1fr;gap:26px}
			.graph{order:2}
		}
		@media (prefers-reduced-motion:reduce){ #lensG{transform:none !important} }
	</style>
</head>
<body>
	<section class="curve-sec">
		<div class="wrap">
			<div class="tx">
				<p class="label">Why FOX</p>
				<h2 class="tit">
					<span class="t-sub">영상만 보는 수업은 그만,</span>
					<span class="t-main">이제 <em class="hl">직접 만들며</em><br />자라는 실력</span>
				</h2>
				<p class="desc">보기만 한 학습은 금방 잊힙니다. 질문하고, 직접 만들고, 발표하는 프로젝트 학습(PBL)으로 배운 것이 진짜 실력으로 남습니다.</p>
				<ul class="legend">
					<li class="l-pbl">프로젝트 학습 (PBL)</li>
					<li class="l-vid">영상만 보는 학습</li>
				</ul>
			</div>

			<div class="graph" id="graph">
				<svg viewBox="0 0 660 460" id="svg">
					<defs>
						<linearGradient id="gline" x1="0" y1="1" x2="1" y2="0">
							<stop offset="0" stop-color="#3194db" /><stop offset="0.55" stop-color="#23bcc4" /><stop offset="1" stop-color="#5eead4" />
						</linearGradient>
						<linearGradient id="gfill" x1="0" y1="0" x2="0" y2="1">
							<stop offset="0" stop-color="#20c5bc" stop-opacity=".22" /><stop offset="1" stop-color="#20c5bc" stop-opacity="0" />
						</linearGradient>
						<filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="6" result="b" /><feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge></filter>
						<clipPath id="lens"><circle cx="476" cy="232" r="132" /></clipPath>
						<path id="curve" d="M 30,438 C 250,432 350,330 452,212 C 534,116 590,86 642,44" />
					</defs>

					<path class="vline" d="M 30,432 C 250,426 440,404 642,362" fill="none" stroke="#2f3b46" stroke-width="2.5" stroke-dasharray="1 11" stroke-linecap="round" />
					<path d="M 30,438 C 250,432 350,330 452,212 C 534,116 590,86 642,44 L 642,456 L 30,456 Z" fill="url(#gfill)" />
					<use href="#curve" fill="none" stroke="url(#gline)" stroke-width="5.5" stroke-linecap="round" filter="url(#glow)" />
					<circle cx="250" cy="432" r="5" fill="#091824" stroke="#3194db" stroke-width="3" />
					<circle cx="452" cy="212" r="5" fill="#091824" stroke="#23bcc4" stroke-width="3" />
					<circle cx="630" cy="52" r="7" fill="#20c5bc" stroke="#091824" stroke-width="3" />

					<!-- 고정 렌즈: 안에서 곡선·노드가 흐름 -->
					<circle cx="476" cy="232" r="132" fill="rgba(32,197,188,.04)" stroke="rgba(124,193,240,.16)" stroke-width="1.5" />
					<g clip-path="url(#lens)">
						<g id="lensG">
							<use href="#curve" fill="none" stroke="url(#gline)" stroke-width="3.4" stroke-linecap="round" />
							<g id="lensNodes"></g>
						</g>
					</g>
					<circle cx="476" cy="232" r="132" fill="none" stroke="rgba(32,197,188,.4)" stroke-width="1.6" />
					<!-- 렌즈 중심 고정 마커 -->
					<circle cx="476" cy="232" r="9" fill="#fff" stroke="#20c5bc" stroke-width="3.5" filter="url(#glow)" />
				</svg>
				<div style="position:absolute;left:38%;top:96%;transform:translate(-50%,-50%);background:rgba(10,24,36,.66);border:1px solid rgba(124,193,240,.26);border-radius:12px;padding:8px 14px;font-weight:700;font-size:13px;backdrop-filter:blur(10px)">이해</div>
				<div style="position:absolute;left:96%;top:9%;transform:translate(-50%,-50%);background:rgba(10,24,36,.66);border:1px solid rgba(32,197,188,.5);border-radius:12px;padding:8px 14px;font-weight:700;font-size:13px;backdrop-filter:blur(10px)">발표 · 성장</div>
			</div>
		</div>
	</section>

	<script>
		(function(){
			var curve=document.getElementById('curve');
			var lensG=document.getElementById('lensG');
			var lensNodes=document.getElementById('lensNodes');
			if(!curve||!lensG)return;
			var L=curve.getTotalLength();
			var CX=476, CY=232, S=1.85;

			var stops=[ {f:0.18,t:'이해'},{f:0.5,t:'제작'},{f:0.84,t:'발표·성장'} ];
			stops.forEach(function(s){
				var pt=curve.getPointAtLength(L*s.f);
				var g=document.createElementNS('http://www.w3.org/2000/svg','g');
				g.innerHTML='<circle cx="'+pt.x+'" cy="'+pt.y+'" r="4.5" fill="#091824" stroke="#2dd4bf" stroke-width="2.4"/>'
					+'<rect x="'+(pt.x+9)+'" y="'+(pt.y-13)+'" rx="6" width="'+(s.t.length*10+18)+'" height="26" class="lbl-bg"/>'
					+'<text x="'+(pt.x+18)+'" y="'+(pt.y+5)+'" class="lbl">'+s.t+'</text>';
				lensNodes.appendChild(g);
			});

			var reduced=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
			function setPan(k){
				var pt=curve.getPointAtLength(L*k);
				lensG.setAttribute('transform','translate('+(CX-pt.x*S)+','+(CY-pt.y*S)+') scale('+S+')');
			}
			if(reduced){ setPan(0.5); return; }
			var DUR=5200, t0=null;
			function loop(t){
				if(!t0)t0=t;
				var k=((t-t0)%DUR)/DUR;
				setPan(k);
				requestAnimationFrame(loop);
			}
			var io=new IntersectionObserver(function(es){es.forEach(function(e){ if(e.isIntersecting){ requestAnimationFrame(loop); io.disconnect(); } });},{threshold:.35});
			io.observe(document.getElementById('graph'));
		})();
	</script>
</body>
</html>
