<!-- 원형 트랙 커리큘럼 시안 v6 (실제 연구소 평면도 서킷 + AI 4영역, 확인용 임시 파일) -->
<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>FOX AI 연구소 — 순환 커리큘럼 시안</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
	<style>
		@font-face { font-family:"GmarketSans"; font-weight:500; font-display:swap; src:url("https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff") format("woff"); }
		@font-face { font-family:"GmarketSans"; font-weight:700; font-display:swap; src:url("https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff") format("woff"); }
		:root{
			--mint:#ebfaf5; --road:#172a44; --lane:#ffce2e; --ink:#0e1b33; --muted:#5f6b80;
			--understand:#15bdb0; --communicate:#3194db; --utilize:#8e5bd4; --create:#e0931a;
			--disp:"GmarketSans","Pretendard Variable",sans-serif; --body:"Pretendard Variable",Pretendard,sans-serif; --en:"Space Grotesk",sans-serif;
		}
		*{margin:0;padding:0;box-sizing:border-box}
		body{font-family:var(--body);color:var(--ink);line-height:1.7;word-break:keep-all;-webkit-font-smoothing:antialiased;background:#fff}
		.wrap{max-width:1060px;margin:0 auto;padding:0 32px}

		.circuit-sec{background:var(--mint);padding:clamp(56px,7vw,96px) 0}
		.sec-head{text-align:center;margin-bottom:clamp(18px,3vw,30px)}
		.sec-head .ov{font-family:var(--en);font-size:13px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#0c8d83;margin-bottom:14px}
		.sec-head h2{font-family:var(--disp);font-weight:700;font-size:clamp(26px,3.4vw,42px);line-height:1.3}
		.sec-head p{margin-top:14px;color:var(--muted);font-size:clamp(15px,1.5vw,17px)}

		.circuit{position:relative;width:100%;max-width:560px;margin:0 auto;aspect-ratio:290/350}
		.circuit svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
		.center{position:absolute;left:57%;top:40%;transform:translate(-50%,-50%);width:38%;max-width:210px;text-align:center;pointer-events:none}
		.center .c-ov{font-family:var(--en);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#0c8d83}
		.center h3{font-family:var(--disp);font-weight:700;font-size:clamp(17px,2.2vw,24px);margin:7px 0 7px;transition:color .3s}
		.center p{font-size:12.5px;color:var(--muted);line-height:1.55;min-height:56px}
		.node{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:2}
		.node .dot{width:clamp(46px,6.6vw,60px);height:clamp(46px,6.6vw,60px);border-radius:50%;background:#fff;border:3px solid var(--c);display:flex;align-items:center;justify-content:center;font-family:var(--disp);font-weight:700;font-size:clamp(13px,1.6vw,16px);color:var(--c);box-shadow:0 8px 20px rgba(14,40,33,.2);transition:transform .3s,background .3s,color .3s}
		.node:hover .dot,.node.act .dot{background:var(--c);color:#fff;transform:scale(1.13)}
		.node.n1{--c:var(--understand)} .node.n2{--c:var(--communicate)} .node.n3{--c:var(--utilize)} .node.n4{--c:var(--create)}

		@media (max-width:680px){
			.wrap{padding:0 18px}
			.circuit{max-width:330px}
			.center{width:42%}
		}
		@media (prefers-reduced-motion:reduce){ .car-anim{display:none} }
	</style>
</head>
<body>
	<section class="circuit-sec">
		<div class="wrap">
			<header class="sec-head">
				<p class="ov">Curriculum</p>
				<h2>한 바퀴를 도는 AI 네 가지 영역</h2>
				<p>이해 · 소통 · 활용 · 창작을 순환하며 한 단계씩 깊어지는 커리큘럼입니다.</p>
			</header>

			<div class="circuit" id="circuit">
				<svg viewBox="0 0 290 350" id="svg">
					<path id="trk" d="M 214,66 C 214,46 188,40 156,42 C 122,44 96,52 90,84 C 84,104 108,114 118,134 C 126,150 96,158 86,182 C 74,210 62,226 64,250 C 66,272 88,282 112,276 C 148,268 184,272 200,276 C 212,278 214,270 214,256 Z" fill="none" stroke="#ffffff" stroke-width="40" stroke-linejoin="round" />
					<path d="M 214,66 C 214,46 188,40 156,42 C 122,44 96,52 90,84 C 84,104 108,114 118,134 C 126,150 96,158 86,182 C 74,210 62,226 64,250 C 66,272 88,282 112,276 C 148,268 184,272 200,276 C 212,278 214,270 214,256 Z" fill="none" stroke="#172a44" stroke-width="32" stroke-linejoin="round" />
					<path d="M 214,66 C 214,46 188,40 156,42 C 122,44 96,52 90,84 C 84,104 108,114 118,134 C 126,150 96,158 86,182 C 74,210 62,226 64,250 C 66,272 88,282 112,276 C 148,268 184,272 200,276 C 212,278 214,270 214,256 Z" fill="none" stroke="#ffce2e" stroke-width="3.5" stroke-dasharray="2 16" stroke-linecap="round" />
					<circle class="car-anim" r="8" fill="#15bdb0" stroke="#fff" stroke-width="3">
						<animateMotion dur="22s" repeatCount="indefinite" rotate="auto"><mpath href="#trk" /></animateMotion>
					</circle>
				</svg>

				<div class="center">
					<p class="c-ov">FOX AI Lab</p>
					<h3 id="cTitle">AI 네 가지 영역</h3>
					<p id="cDesc">트랙 위 네 지점에 마우스를 올려 보세요.</p>
				</div>

				<div class="node n1" data-k="understand"><span class="dot">이해</span></div>
				<div class="node n2" data-k="communicate"><span class="dot">소통</span></div>
				<div class="node n3" data-k="utilize"><span class="dot">활용</span></div>
				<div class="node n4" data-k="create"><span class="dot">창작</span></div>
			</div>
		</div>
	</section>

	<script>
		(function(){
			var path=document.getElementById('trk');
			var nodes=document.querySelectorAll('.node');
			function place(){
				var len=path.getTotalLength();
				var fr=[0.10,0.34,0.60,0.86];
				nodes.forEach(function(n,i){
					var p=path.getPointAtLength(len*fr[i]);
					n.style.left=(p.x/290*100)+'%';
					n.style.top=(p.y/350*100)+'%';
				});
			}
			place();
			window.addEventListener('resize',place,{passive:true});

			var data={
				understand:{t:'AI 이해',c:'#0c8d83',d:'AI와 디지털 도구의 원리를 이해하고 올바르게 판단합니다. 비버챌린지, 생성형 AI 활용, COS.'},
				communicate:{t:'AI 소통',c:'#185fa5',d:'코딩 언어와 디지털 표현으로 원하는 결과를 전달합니다. 스크래치, 파이썬 기초.'},
				utilize:{t:'AI 활용',c:'#5b3a9c',d:'AI와 다양한 도구로 문제를 해결합니다. 레고, 마인크래프트 에듀케이션, NASA Kids.'},
				create:{t:'AI 창작',c:'#a8690a',d:'나만의 아이디어를 결과물로 완성합니다. AI 포스터·애니메이션·음악, 게임 제작.'}
			};
			var title=document.getElementById('cTitle');
			var desc=document.getElementById('cDesc');
			var base={t:'AI 네 가지 영역',c:'#0e1b33',d:'트랙 위 네 지점에 마우스를 올려 보세요.'};
			function set(o){ title.textContent=o.t; title.style.color=o.c; desc.textContent=o.d; }
			nodes.forEach(function(n){
				var k=n.getAttribute('data-k');
				function on(){ set(data[k]); nodes.forEach(function(x){x.classList.remove('act')}); n.classList.add('act'); }
				n.addEventListener('mouseenter',on);
				n.addEventListener('click',on);
			});
			document.getElementById('circuit').addEventListener('mouseleave',function(){ set(base); nodes.forEach(function(x){x.classList.remove('act')}); });
		})();
	</script>
</body>
</html>
